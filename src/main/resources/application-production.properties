# Production Configuration for Render
# These values will be overridden by environment variables from Render

# Database Configuration (set by environment variables)
# Render PostgreSQL sets DATABASE_URL; Blueprints may use SPRING_DATASOURCE_* instead.
# DataSourceConfig parses postgresql:// URLs and fills username/password when embedded.
# Docker web services: internal DATABASE_URL host may be "dpg-...-a" only — DataSourceConfig expands
# to dpg-...-a.<RENDER_REGION>-postgres.render.com (Render sets RENDER_REGION on your web service).
# Override host with RENDER_POSTGRES_HOST if your database region differs from the web service.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Managed Postgres (e.g. Render) can be slow to accept first connections after idle
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
# Driver class name is auto-detected from URL, but can be overridden if needed
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
# Explicit dialect avoids Hibernate probing JDBC for metadata before a connection exists (reduces
# confusing "jdbcEnvironment is null" errors when the DB URL is wrong or not yet resolvable)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=${PORT:10000}
server.error.include-message=never
server.error.include-stacktrace=never

# JWT: set JWT_SECRET on Render in production; default only so the service can boot if unset
jwt.secret=${JWT_SECRET:smart-parking-change-me-set-JWT-secret-on-render-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400}

# Logging
logging.level.root=INFO
logging.level.com.smart.parking=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS - Update with your frontend URL
# This will be set via environment variable in production

